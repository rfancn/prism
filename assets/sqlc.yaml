version: "2"
sql:
  - schema: "schema"
    queries: "queries"
    engine: "sqlite"
    gen:
      go:
        package: "db"
        sql_package: "database/sql"
        out: "../autogen/db"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true