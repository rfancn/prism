# Prism Configuration File
# Copy this file to prism.toml and modify as needed

[sdk]
    [sdk.log]
        # Log level: "trace", "debug", "info", "warn", "error", "fatal", "panic"
        level = "debug"
        # Log file name
        filename = "prism.log"
        # Log rotation configuration
        [sdk.log.rotate]
            # Max age in hours (168 = 7 days)
            max_age = 168
            # Rotation interval in hours
            rotation_time = 24

    [sdk.sqlite]
        # SQLite database file path
        db = "prism.db"

[app]
    [app.server]
        # Server host
        host = "0.0.0.0"
        # HTTP port
        port = 8080
        # HTTPS port (when TLS is enabled)
        tls_port = 8443

    [app.proxy]
        # Read timeout in seconds
        read_timeout = 30
        # Write timeout in seconds
        write_timeout = 30
        # Idle timeout in seconds
        idle_timeout = 120

    [app.route]
        # Protected route prefix (requires authentication)
        protect_prefix = "/api"
        # Public route prefix (no authentication required)
        public_prefix = "/public"

    [app.ratelimit]
        # Time window size in seconds for rate limiting
        window_size = 10
        # Max requests per window
        limit = 100